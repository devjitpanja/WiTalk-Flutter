name: witalk
description: "WiTalk - Connect. Talk. Belong."
publish_to: 'none'

version: 1.0.0+200

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  firebase_messaging: ^16.4.3
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  firebase_performance: ^0.11.4+5

  # --- Auth ---
  google_sign_in: ^6.2.2

  # --- State Management ---
  flutter_riverpod: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- HTTP + API ---
  dio: ^5.8.0+1
  graphql_flutter: ^5.2.0

  # --- Storage ---
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1

  # --- Offline Database (replaces WatermelonDB + Realm) ---
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # --- Real-time ---
  socket_io_client: ^2.0.3+1

  # --- Live Audio/Video Calls (LiveKit) ---
  # livekit_client: add back once backend call infrastructure is configured

  # --- Push Notifications ---
  onesignal_flutter: ^5.3.3

  # --- In-App Purchases ---
  in_app_purchase: ^3.2.0

  # --- Ads --- (add google_mobile_ads once ad unit IDs are configured)

  # --- Media ---
  video_player: ^2.9.5
  chewie: ^1.14.1
  camera: ^0.12.0
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # --- Maps ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- UI ---
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0
  # fluttertoast removed — using ScaffoldMessenger.showSnackBar
  flutter_staggered_animations: ^1.1.1
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^13.0.0
  connectivity_plus: ^6.1.3
  permission_handler: ^11.4.0
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.1
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  badges: ^3.1.2
  fl_chart: ^0.70.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.3.0
  giphy_get: ^3.6.1+1
  emoji_picker_flutter: ^4.4.0  # TODO: upgrade if newer version removes KGP usage
  # record: add back when targeting Android/iOS only build config
  audioplayers: ^6.4.0
  geolocator: ^13.0.2
  # geocoding: removed due to SDK incompatibility — use geolocator coordinates directly
  collection: ^1.19.1
  rxdart: ^0.28.0
  encrypt: ^5.0.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/audio/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
